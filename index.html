<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Zahra Essam">
<title>Digital Learning Path</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;600;700;800;900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-2:#0B1A35;--navy-4:#162D56;
  --s50:#F8FAFC;--s100:#F1F5F9;--s200:#E2E8F0;--s300:#CBD5E1;
  --s400:#94A3B8;--s500:#64748B;--s800:#1E293B;--s900:#0F172A;
  --white:#FFFFFF;
  --fh:'Tajawal',sans-serif;--fb:'Cairo',sans-serif;--fm:'IBM Plex Mono',monospace;
  --r:12px;--r-lg:18px;--r-sm:8px;--r-xs:4px;
  --sh-sm:0 1px 3px rgba(0,0,0,.06);--sh:0 4px 14px rgba(0,0,0,.09);
  --tr:.2s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--s50);color:var(--s800);min-height:100vh;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit}
button{font-family:var(--fb);cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--s100)}::-webkit-scrollbar-thumb{background:var(--s300);border-radius:3px}

.page{max-width:960px;margin:0 auto;padding:0 24px 80px;}

/* HEADER */
.site-header{padding:36px 0 28px;display:flex;flex-direction:column;align-items:center;gap:16px;position:relative;}
.site-header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--s200),transparent);}
.logo-ring{width:72px;height:72px;background:linear-gradient(145deg,var(--navy-2),var(--navy-4));border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(99,102,241,.35);box-shadow:0 0 0 6px rgba(99,102,241,.07),0 8px 28px rgba(99,102,241,.2);position:relative;}
.logo-ring svg{width:34px;height:34px;}
.logo-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1.5px dashed rgba(165,180,252,.22);animation:spin 18s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-name{font-family:var(--fm);font-size:10px;letter-spacing:4px;color:var(--s400);text-transform:uppercase;}
.logo-title{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--s900);text-align:center;line-height:1.2;letter-spacing:-.3px;}
.logo-title span{color:#6366F1;}
.curric-btn{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--navy-2),var(--navy-4));color:var(--white);border:1px solid rgba(99,102,241,.3);border-radius:var(--r-lg);padding:11px 22px;font-family:var(--fh);font-size:14px;font-weight:700;transition:all var(--tr);box-shadow:0 4px 18px rgba(99,102,241,.2);}
.curric-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(99,102,241,.35);}
.curric-btn svg{width:17px;height:17px;color:#a5b4fc;flex-shrink:0;}
.curric-btn-inner{display:flex;flex-direction:column;gap:1px;}

/* PROGRESS */
.prog-wrap{background:var(--white);border:1px solid var(--s200);border-radius:var(--r);padding:14px 20px;margin:28px 0 20px;display:flex;align-items:center;gap:16px;box-shadow:var(--sh-sm);}
.prog-icon{width:36px;height:36px;border-radius:var(--r-sm);background:#EEF2FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prog-icon svg{width:17px;height:17px;color:#6366F1;}
.prog-info{flex:1;min-width:0;}
.prog-title{font-family:var(--fh);font-size:13px;font-weight:800;color:var(--s900);}
.prog-sub{font-size:11px;color:var(--s500);margin-top:2px;}
.prog-track{width:180px;height:5px;background:var(--s100);border-radius:3px;overflow:hidden;flex-shrink:0;}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#6366F1,#818cf8);transition:width .5s ease;}
.prog-pct{font-family:var(--fm);font-size:12px;font-weight:700;color:#6366F1;flex-shrink:0;width:36px;text-align:center;}
@media(max-width:580px){.prog-wrap{flex-wrap:wrap;}.prog-track{width:100%;order:4;}}

/* EYEBROW */
.eyebrow{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.ey-line{flex:1;height:1px;background:var(--s200);}
.ey-text{font-family:var(--fm);font-size:10px;letter-spacing:3px;color:var(--s400);font-weight:700;white-space:nowrap;text-transform:uppercase;}

/* LEGEND */
.legend-row{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:20px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--s500);font-family:var(--fm);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* TREE */
.tree-root{background:var(--white);border:1px solid var(--s200);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:20px;overflow:hidden;}
.levels-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;width:100%;}

/* LEVEL COLUMN */
.lv-col{display:flex;flex-direction:column;align-items:stretch;min-width:0;--c:#6366F1;}

.lv-pill{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 8px 10px;border-radius:var(--r-sm);
  border:1.5px solid var(--s200);background:var(--white);
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color var(--tr),box-shadow var(--tr),transform var(--tr);
  width:100%;min-width:0;
}
.lv-pill::after{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--c);opacity:.6;transition:opacity var(--tr);}
.lv-pill:hover{border-color:var(--c);box-shadow:var(--sh);transform:translateY(-1px);}
.lv-pill:hover::after,.lv-pill.on::after{opacity:1;}
.lv-pill.on{border-color:var(--c);background:color-mix(in srgb,var(--c) 4%,var(--white));}

.lv-ico{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--c) 10%,transparent);border:1.5px solid color-mix(in srgb,var(--c) 20%,transparent);transition:all var(--tr);}
.lv-ico svg{width:15px;height:15px;color:var(--c);}
.lv-pill.on .lv-ico{background:var(--c);border-color:var(--c);}
.lv-pill.on .lv-ico svg{color:#fff;}

.lv-num{font-family:var(--fm);font-size:8px;letter-spacing:1.5px;font-weight:700;color:var(--c);text-transform:uppercase;}
.lv-name{font-family:var(--fh);font-size:11.5px;font-weight:800;color:var(--s900);text-align:center;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;width:100%;}
.lv-chev{width:12px;height:12px;color:var(--s400);transition:transform var(--tr);flex-shrink:0;}
.lv-pill.on .lv-chev{transform:rotate(180deg);color:var(--c);}

.lv-trunk{align-self:center;width:2px;height:12px;background:linear-gradient(to bottom,var(--c),transparent);border-radius:1px;display:none;flex-shrink:0;}
.lv-col.on>.lv-trunk{display:block;}

/* MODULES STACK */
.mods-stack{display:none;flex-direction:column;width:100%;min-width:0;}
.lv-col.on>.mods-stack{display:flex;animation:fd .22s ease both;}
@keyframes fd{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* MODULE */
.mod-wrap{display:flex;flex-direction:column;align-items:stretch;min-width:0;}
.mod-conn{align-self:center;width:2px;height:8px;background:color-mix(in srgb,var(--c) 28%,transparent);flex-shrink:0;}

.mod-pill{
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  padding:8px 9px;border-radius:var(--r-xs);
  border:1px solid var(--s200);background:var(--white);
  cursor:pointer;transition:all var(--tr);
  width:100%;min-width:0;overflow:hidden;position:relative;
}
.mod-pill::before{content:'';position:absolute;top:0;right:0;bottom:0;width:2px;background:var(--c);opacity:0;transition:opacity var(--tr);}
.mod-pill:hover::before,.mod-pill.on::before{opacity:1;}
.mod-pill:hover{border-color:var(--s300);box-shadow:var(--sh-sm);}
.mod-pill.on{border-color:var(--c);background:color-mix(in srgb,var(--c) 4%,var(--white));}

.mod-header{display:flex;align-items:center;gap:5px;width:100%;min-width:0;}
.mod-dot{width:5px;height:5px;border-radius:50%;background:var(--c);opacity:.4;flex-shrink:0;transition:opacity var(--tr);}
.mod-pill.on .mod-dot{opacity:1;}
.mod-name{font-size:10.5px;font-weight:700;color:var(--s800);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.mod-pill.on .mod-name{color:var(--c);}
.mod-chev{width:10px;height:10px;color:var(--s400);transition:transform var(--tr);flex-shrink:0;}
.mod-pill.on .mod-chev{transform:rotate(180deg);color:var(--c);}
.mod-cnt{font-family:var(--fm);font-size:7.5px;color:var(--s400);padding-right:10px;}
.mod-pill.on .mod-cnt{display:none;}

.mod-trunk{align-self:center;width:2px;height:6px;background:color-mix(in srgb,var(--c) 20%,transparent);display:none;flex-shrink:0;}
.mod-wrap.on>.mod-trunk{display:block;}

/* SESSIONS */
.ses-list{display:none;flex-direction:column;width:100%;min-width:0;position:relative;padding-bottom:4px;}
.mod-wrap.on>.ses-list{display:flex;animation:fd .18s ease both;}
.ses-list::before{content:'';position:absolute;right:calc(50% - 1px);top:0;bottom:4px;width:2px;background:linear-gradient(to bottom,color-mix(in srgb,var(--c) 16%,transparent),transparent);pointer-events:none;border-radius:1px;}

.ses-row{display:flex;flex-direction:column;align-items:center;gap:0;}
.ses-node{height:8px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;flex-shrink:0;}
.ses-dot{width:5px;height:5px;border-radius:50%;background:var(--c);box-shadow:0 0 0 2px color-mix(in srgb,var(--c) 12%,transparent);flex-shrink:0;}
.ses-dot.off{background:var(--s300);box-shadow:none;}

/* Session card — dot on LEFT (west), text on right */
.ses-card{
  width:100%;min-width:0;
  background:var(--white);border:1px solid var(--s200);border-radius:var(--r-xs);
  padding:6px 8px;
  display:flex;align-items:center;gap:6px;
  /* dot is leftmost in LTR terms = visually on the left/west side */
  flex-direction:row-reverse; /* in RTL this puts dot on the left (west) */
  transition:all var(--tr);text-decoration:none;color:inherit;
  position:relative;overflow:hidden;
}
.ses-card::before{content:'';position:absolute;top:0;right:0;bottom:0;width:2px;background:var(--c);opacity:0;transition:opacity var(--tr);}
a.ses-card:hover::before{opacity:1;}
a.ses-card:hover{box-shadow:var(--sh-sm);border-color:var(--s300);}
div.ses-card{opacity:.42;}

/* dot indicator inside card — sits on the left (west) */
.ses-card-dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;
  background:var(--c);
  box-shadow:0 0 0 2px color-mix(in srgb,var(--c) 12%,transparent);
}
div.ses-card .ses-card-dot{background:var(--s300);box-shadow:none;}

.ses-body{flex:1;min-width:0;overflow:hidden;}
.ses-n{font-family:var(--fm);font-size:7px;color:var(--s400);letter-spacing:.4px;line-height:1.2;}
.ses-t{font-size:10px;font-weight:700;color:var(--s800);line-height:1.3;}
div.ses-card .ses-t{color:var(--s400);}

/* LEVEL SUMMARY */
.lv-summary{display:none;flex-direction:column;gap:0;width:100%;min-width:0;}
.lv-col.on>.lv-summary{display:flex;}
.sum-conn{align-self:center;width:2px;height:8px;background:color-mix(in srgb,var(--c) 18%,transparent);flex-shrink:0;}
.sum-label{font-family:var(--fm);font-size:7.5px;letter-spacing:1.5px;font-weight:700;color:var(--s400);text-transform:uppercase;text-align:center;padding:4px 0 3px;}
.sum-badges{display:flex;gap:4px;width:100%;}

.bdg{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 3px;border-radius:var(--r-xs);border:1px solid;cursor:pointer;transition:all var(--tr);text-decoration:none;color:inherit;min-width:0;overflow:hidden;}
.bdg:hover{transform:translateY(-1px);box-shadow:var(--sh-sm);}
.bdg.mm{background:rgba(5,150,105,.05);border-color:rgba(5,150,105,.16);}
.bdg.ex{background:rgba(217,119,6,.05);border-color:rgba(217,119,6,.16);}
.bdg.off{opacity:.28;cursor:not-allowed;pointer-events:none;}
.bdg-ico{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.bdg.mm .bdg-ico{background:rgba(5,150,105,.1);}
.bdg.ex .bdg-ico{background:rgba(217,119,6,.1);}
.bdg.mm .bdg-ico svg{color:#059669;width:9px;height:9px;}
.bdg.ex .bdg-ico svg{color:#D97706;width:9px;height:9px;}
.bdg-lbl{font-family:var(--fm);font-size:7px;letter-spacing:.2px;color:var(--s500);text-align:center;line-height:1.2;}

/* NEXT HINT */
.lv-next{display:none;margin-top:6px;padding:6px 8px;border-radius:var(--r-xs);background:color-mix(in srgb,var(--c) 5%,var(--white));border:1px dashed color-mix(in srgb,var(--c) 30%,transparent);font-family:var(--fm);font-size:7.5px;color:var(--s500);line-height:1.4;text-align:center;}
.lv-col.on .lv-next{display:block;}
.lv-next strong{color:var(--c);font-size:7.5px;}

/* FOOTER */
.site-footer{padding:20px 0 10px;border-top:1px solid var(--s200);margin-top:40px;text-align:center;font-family:var(--fm);font-size:11px;letter-spacing:2.5px;color:var(--s400);}
</style>
</head>

function build(){
  const grid=document.getElementById('levels-grid');

  DATA.forEach(lv=>{
    const totalS=lv.modules.reduce((a,m)=>a+m.sessions.length,0);
    const activeS=lv.modules.reduce((a,m)=>a+m.sessions.filter(s=>s.link).length,0);

    const col=document.createElement('div');
    col.className='lv-col';
    col.style.setProperty('--c',lv.color);

    /* level pill */
    const pill=document.createElement('button');
    pill.className='lv-pill';
    pill.innerHTML=`
      <div class="lv-ico">${IC[lv.icon]}</div>
      <div class="lv-num">${lv.num}</div>
      <div class="lv-name">${lv.name}</div>
      <div class="lv-chev">${IC.chev}</div>`;

    const trunk=document.createElement('div');
    trunk.className='lv-trunk';

    const modsStack=document.createElement('div');
    modsStack.className='mods-stack';

    lv.modules.forEach((mod)=>{
      const activeM=mod.sessions.filter(s=>s.link).length;

      const mwrap=document.createElement('div');
      mwrap.className='mod-wrap';
      mwrap.style.setProperty('--c',lv.color);

      const mconn=document.createElement('div');
      mconn.className='mod-conn';

      const mpill=document.createElement('button');
      mpill.className='mod-pill';
      mpill.style.setProperty('--c',lv.color);
      mpill.innerHTML=`
        <div class="mod-header">
          <div class="mod-dot"></div>
          <div class="mod-name">${mod.name}</div>
          <div class="mod-chev">${IC.chev}</div>
        </div>
        <div class="mod-cnt">${activeM}/${mod.sessions.length} sessions</div>`;

      const mtrunk=document.createElement('div');
      mtrunk.className='mod-trunk';

      const sesList=document.createElement('div');
      sesList.className='ses-list';
      sesList.style.setProperty('--c',lv.color);

      mod.sessions.forEach((ses,si)=>{
        const hasL=!!ses.link;
        const row=document.createElement('div');
        row.className='ses-row';

        /* connector dot above card */
        const node=document.createElement('div');
        node.className='ses-node';
        const dot=document.createElement('div');
        dot.className='ses-dot'+(hasL?'':' off');
        node.appendChild(dot);

        /* card: flex-direction:row-reverse places dot on west/left in RTL */
        const card=document.createElement(hasL?'a':'div');
        card.className='ses-card';
        card.style.setProperty('--c',lv.color);
        if(hasL){card.href=ses.link;card.target='_blank';card.rel='noopener';}

        /* dot inside card on the left (west) */
        const cdot=document.createElement('div');
        cdot.className='ses-card-dot';

        const body=document.createElement('div');
        body.className='ses-body';
        body.innerHTML=`<div class="ses-n">S${si+1}</div><div class="ses-t">${ses.t}</div>`;

        card.appendChild(cdot);
        card.appendChild(body);

        row.appendChild(node);
        row.appendChild(card);
        sesList.appendChild(row);
      });

      mpill.addEventListener('click',()=>{
        const o=mwrap.classList.contains('on');
        mwrap.classList.toggle('on',!o);
        mpill.classList.toggle('on',!o);
      });

      mwrap.appendChild(mconn);
      mwrap.appendChild(mpill);
      mwrap.appendChild(mtrunk);
      mwrap.appendChild(sesList);
      modsStack.appendChild(mwrap);
    });

    /* level summary */
    const lvSum=document.createElement('div');
    lvSum.className='lv-summary';
    lvSum.style.setProperty('--c',lv.color);
    const sumConn=document.createElement('div');sumConn.className='sum-conn';
    const sumLabel=document.createElement('div');sumLabel.className='sum-label';sumLabel.textContent='Level Review';
    const sumBadges=document.createElement('div');sumBadges.className='sum-badges';

    const mm=document.createElement(lv.summary.mindmap?'a':'div');
    mm.className='bdg mm'+(lv.summary.mindmap?'':' off');
    if(lv.summary.mindmap){mm.href=lv.summary.mindmap;mm.target='_blank';mm.rel='noopener';}
    mm.innerHTML=`<div class="bdg-ico">${IC.mindmap}</div><div class="bdg-lbl">Mind Map</div>`;

    const ex=document.createElement(lv.summary.exam?'a':'div');
    ex.className='bdg ex'+(lv.summary.exam?'':' off');
    if(lv.summary.exam){ex.href=lv.summary.exam;ex.target='_blank';ex.rel='noopener';}
    ex.innerHTML=`<div class="bdg-ico">${IC.exam}</div><div class="bdg-lbl">Level Exam</div>`;

    sumBadges.appendChild(mm);sumBadges.appendChild(ex);
    lvSum.appendChild(sumConn);lvSum.appendChild(sumLabel);lvSum.appendChild(sumBadges);

    /* next hint */
    const nextHint=document.createElement('div');
    nextHint.className='lv-next';
    nextHint.innerHTML=lv.next
      ?`<strong>Next →</strong> ${lv.next}`
      :`🎓 Final level`;

    pill.addEventListener('click',()=>{
      const o=col.classList.contains('on');
      col.classList.toggle('on',!o);
      pill.classList.toggle('on',!o);
      if(o){
        modsStack.querySelectorAll('.mod-wrap.on').forEach(m=>m.classList.remove('on'));
        modsStack.querySelectorAll('.mod-pill.on').forEach(m=>m.classList.remove('on'));
      }
    });

    col.appendChild(pill);
    col.appendChild(trunk);
    col.appendChild(modsStack);
    col.appendChild(lvSum);
    col.appendChild(nextHint);
    grid.appendChild(col);
  });

  setTimeout(()=>grid.querySelector('.lv-pill').click(),160);
  buildLegend();
  buildProgress();
}

function buildLegend(){
  const row=document.getElementById('legend-row');
  DATA.forEach(lv=>{
    const d=document.createElement('div');d.className='leg-item';
    d.innerHTML=`<div class="leg-dot" style="background:${lv.color}"></div><span>${lv.num}</span>`;
    row.appendChild(d);
  });
  [{c:'#059669',l:'Mind Map'},{c:'#D97706',l:'Level Exam'},{c:'#94A3B8',l:'Coming soon'}].forEach(e=>{
    const d=document.createElement('div');d.className='leg-item';
    d.innerHTML=`<div class="leg-dot" style="background:${e.c}"></div><span>${e.l}</span>`;
    row.appendChild(d);
  });
}

function buildProgress(){
  let total=0,active=0;
  DATA.forEach(lv=>lv.modules.forEach(m=>m.sessions.forEach(s=>{total++;if(s.link)active++;})));
  const pct=total?Math.round(active/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-sub').textContent=`${active} of ${total} sessions available`;
}

build();
</script>
